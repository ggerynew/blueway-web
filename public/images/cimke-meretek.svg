<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470" font-family="Inter, Arial, sans-serif">
  <rect width="760" height="470" fill="#ffffff"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#111114"/>
    </marker>
  </defs>

  <text x="40" y="40" fill="#111114" font-size="17" font-weight="600">Címke- és tekercsméretek</text>

  <g stroke="#111114">
    <!-- Címke -->
    <line x1="120" y1="86" x2="300" y2="86" stroke-width="1.2" marker-end="url(#ar)"/>
    <text x="205" y="74" text-anchor="middle" fill="#55555e" font-size="12" stroke="none">Szállítási irány</text>
    <rect x="120" y="110" width="180" height="120" rx="18" fill="#ffffff" stroke-width="2"/>
    <line x1="120" y1="230" x2="120" y2="274" stroke-width="1" opacity="0.5"/>
    <line x1="300" y1="230" x2="300" y2="274" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="264" x2="300" y2="264" stroke-width="1.2" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <rect x="200" y="254" width="20" height="20" fill="#ffffff" stroke="none"/>
    <text x="210" y="268" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700" stroke="none">W</text>
    <line x1="120" y1="110" x2="76" y2="110" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="230" x2="76" y2="230" stroke-width="1" opacity="0.5"/>
    <line x1="86" y1="110" x2="86" y2="230" stroke-width="1.2" marker-start="url(#ar)" marker-end="url(#ar)"/>
    <rect x="76" y="160" width="20" height="20" fill="#ffffff" stroke="none"/>
    <text x="86" y="174" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700" stroke="none">H</text>
    <line x1="133" y1="120" x2="176" y2="92" stroke-width="1" opacity="0.6"/>
    <text x="186" y="90" fill="#1d4ed8" font-size="14" font-weight="700" stroke="none">R</text>
    <text x="210" y="315" text-anchor="middle" fill="#55555e" font-size="13" stroke="none">Címke</text>

    <!-- Tekercs -->
    <g transform="translate(410,0)">
      <circle cx="150" cy="170" r="95" fill="#ffffff" stroke-width="2"/>
      <circle cx="150" cy="170" r="32" fill="#fafafa" stroke-width="1.6"/>
      <line x1="55" y1="170" x2="55" y2="76" stroke-width="1" opacity="0.5"/>
      <line x1="245" y1="170" x2="245" y2="76" stroke-width="1" opacity="0.5"/>
      <line x1="55" y1="86" x2="245" y2="86" stroke-width="1.2" marker-start="url(#ar)" marker-end="url(#ar)"/>
      <rect x="128" y="76" width="44" height="20" fill="#ffffff" stroke="none"/>
      <text x="150" y="90" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700" stroke="none">Ø D</text>
      <line x1="118" y1="170" x2="182" y2="170" stroke-width="1.2" marker-start="url(#ar)" marker-end="url(#ar)"/>
      <rect x="128" y="148" width="44" height="18" fill="#fafafa" stroke="none"/>
      <text x="150" y="162" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="700" stroke="none">Ø d</text>
      <text x="150" y="315" text-anchor="middle" fill="#55555e" font-size="13" stroke="none">Tekercs</text>
    </g>
  </g>

  <!-- Jelmagyarázat -->
  <line x1="40" y1="350" x2="720" y2="350" stroke="#e7e7ea" stroke-width="1"/>
  <g font-size="14">
    <text x="40" y="380" fill="#1d4ed8" font-weight="700">W</text><text x="90" y="380" fill="#55555e">Címke szélessége</text>
    <text x="400" y="380" fill="#1d4ed8" font-weight="700">H</text><text x="450" y="380" fill="#55555e">Címke magassága</text>
    <text x="40" y="408" fill="#1d4ed8" font-weight="700">R</text><text x="90" y="408" fill="#55555e">Sarok lekerekítés</text>
    <text x="400" y="408" fill="#1d4ed8" font-weight="700">Ø D</text><text x="450" y="408" fill="#55555e">Tekercs külső átmérője</text>
    <text x="40" y="436" fill="#1d4ed8" font-weight="700">Ø d</text><text x="90" y="436" fill="#55555e">Magátmérő (belső)</text>
  </g>
</svg>
